services:
  - type: web
    name: swisstopo-mcp
    runtime: python
    buildCommand: pip install -e .
    startCommand: uvicorn swisstopo_mcp.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MCP_TRANSPORT
        value: streamable_http
      - key: PORT
        value: 8000
    healthCheckPath: /health
